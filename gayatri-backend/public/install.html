<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Install App - Gayatri Enterprises</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1B7A52">
    <link rel="icon" type="image/png" href="pwa-icon.png">
    <link rel="apple-touch-icon" href="pwa-icon.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        .logo {
            width: 88px;
            height: 88px;
            border-radius: 18px;
            margin: 0 auto 20px;
            display: block;
            object-fit: contain;
            box-shadow: 0 4px 16px rgba(37, 99, 235, 0.15);
            background: #fff;
            padding: 5px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
            line-height: 1.35;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 28px;
        }

        .features {
            background: #f8fafc;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 28px;
            text-align: left;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            font-size: 14px;
            color: #475569;
        }

        .feature+.feature {
            border-top: 1px solid #e2e8f0;
        }

        .feature svg {
            flex-shrink: 0;
            color: #1B7A52;
        }

        #installBtn {
            width: 100%;
            padding: 15px;
            background: #1B7A52;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 12px;
        }

        #installBtn:hover {
            background: #145C3F;
        }

        #installBtn.hidden {
            display: none;
        }

        #installBtn:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .ios-instructions {
            display: none;
            background: #eff6ff;
            border: 1px dashed #bfdbfe;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            text-align: left;
            font-size: 14px;
            color: #1e40af;
        }

        .ios-instructions b {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
        }

        #status {
            font-size: 13px;
            color: #94a3b8;
            min-height: 18px;
            line-height: 1.4;
        }

        #status.success {
            color: #16a34a;
            font-weight: 500;
        }

        #homeBtn {
            display: none;
            width: 100%;
            padding: 15px;
            background: #1e293b;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        #homeBtn:hover {
            background: #0f172a;
        }
    </style>
</head>

<body>
    <div class="card">
        <img src="pwa-icon.png" class="logo" alt="Gayatri Enterprises Logo">

        <h1>Gayatri<br>Enterprises</h1>
        <p class="subtitle">B2B Chemical Supply &mdash; Client Portal</p>

        <div class="features">
            <div class="feature">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                </svg>
                Access documents and files securely
            </div>
            <div class="feature">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <polyline points="9 11 12 14 22 4" />
                    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
                </svg>
                Track tasks and updates in real-time
            </div>
            <div class="feature">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
                    <line x1="12" y1="18" x2="12.01" y2="18" />
                </svg>
                Quick access from your home screen
            </div>
        </div>

        <div id="iosInstructions" class="ios-instructions">
            1. Tap the <b>Share <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg></b> button in Safari.<br>
            2. Scroll down and tap <b>Add to Home Screen</b>.
        </div>

        <button id="installBtn" disabled>Install App</button>
        <a href="/" id="homeBtn">Go to Home Screen</a>
        <div id="status">Syncing with system... Please wait.</div>
    </div>

    <script>
        const btn = document.getElementById('installBtn');
        const homeBtn = document.getElementById('homeBtn');
        const status = document.getElementById('status');
        const iosInst = document.getElementById('iosInstructions');
        let deferredPrompt;

        const isIos = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;

        if (isStandalone) {
            // 🔥 REDIRECT if already installed
            window.location.href = '/portal';
        } else if (isIos) {
            btn.classList.add('hidden');
            iosInst.style.display = 'block';
            status.innerText = 'Follow the steps above to install on iOS.';
        } else {
            status.innerText = 'Preparing install...';
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('SW Registered'))
                .catch(err => console.error('SW Registration Failed', err));
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            status.innerText = 'App is ready for installation.';
            btn.disabled = false;
        });

        btn.addEventListener('click', () => {
            if (!deferredPrompt) {
                status.innerText = 'Use browser install option.';
                return;
            }
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((result) => {
                if (result.outcome === 'accepted') {
                    status.innerText = 'Installing...';
                    btn.disabled = true;
                } else {
                    status.innerText = 'Installation cancelled.';
                }
                deferredPrompt = null;
            });
        });

        // 🔥 MAIN FIX: redirect after install
        window.addEventListener('appinstalled', () => {
            window.location.href = '/portal';
        });
    </script>
</body>

</html>
